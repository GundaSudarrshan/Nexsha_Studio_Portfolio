<header class="site-header" [class.scrolled]="isScrolled()" [class.menu-open]="menuOpen()">

  <!-- ─── Top Bar ─────────────────────────────────────────── -->
  <div class="site-header__bar">

    <!-- Logo -->
    <a routerLink="/" class="site-header__logo" (click)="closeMenu()" aria-label="Nexsha Studio – Home">
      <img src="/assets/logo/png.png" alt="Nexsha Studio" />
    </a>

    <!-- Desktop nav -->
    <nav class="site-header__nav" aria-label="Primary navigation">
      <a routerLink="/"        routerLinkActive="is-active" [routerLinkActiveOptions]="{exact:true}">Home</a>
      <a routerLink="/projects" routerLinkActive="is-active">Portfolio</a>
      <a routerLink="/about"    routerLinkActive="is-active">Studio</a>
      <a routerLink="/contact"  routerLinkActive="is-active">Contact</a>
    </nav>

    <!-- Desktop actions: social links + Connect CTA -->
    <div class="site-header__actions">
      @for (link of portfolio.socialLinks(); track link.platform) {
        <a [href]="link.url" target="_blank" rel="noopener" class="site-header__social">{{ link.platform }}</a>
      }
      <a routerLink="/contact" class="site-header__connect">Connect</a>
    </div>

    <!-- Hamburger (mobile only) -->
    <button
      class="site-header__hamburger"
      [class.is-open]="menuOpen()"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle navigation menu"
      type="button">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- ─── Mobile Overlay ───────────────────────────────────── -->
  <div
    class="site-header__overlay"
    [class.is-open]="menuOpen()"
    (click)="closeMenu()"
    aria-hidden="true">

    <!-- Close button inside overlay for explicit dismiss (uses inline SVG) -->
    <button class="site-header__overlay-close" type="button" aria-label="Close navigation" (click)="closeMenu()">
      <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <g fill="none" fill-rule="evenodd">
          <path d="M0 0h24v24H0z"/>
          <path d="M16.909 6 18 7.091 13.09 12 18 16.909 16.909 18 12 13.09 7.091 18 6 16.909 10.909 12 6 7.091 7.091 6 12 10.909 16.909 6z" fill="#c7982c"/>
        </g>
      </svg>
    </button>

    <nav
      class="site-header__mobile-nav"
      (click)="$event.stopPropagation()"
      aria-label="Mobile navigation">

      <a routerLink="/"        routerLinkActive="is-active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a>
      <a routerLink="/projects" routerLinkActive="is-active" (click)="closeMenu()">Portfolio</a>
      <a routerLink="/about"    routerLinkActive="is-active" (click)="closeMenu()">Studio</a>
      <a routerLink="/contact"  routerLinkActive="is-active" (click)="closeMenu()">Contact</a>

      <a routerLink="/contact" class="mobile-connect" (click)="closeMenu()">Connect</a>

      <div class="mobile-socials">
        @for (link of portfolio.socialLinks(); track link.platform) {
          <a [href]="link.url" target="_blank" rel="noopener">{{ link.platform }}</a>
        }
      </div>

    </nav>
  </div>

</header>
