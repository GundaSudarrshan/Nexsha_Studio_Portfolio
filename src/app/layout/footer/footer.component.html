<footer class="app-footer">
  <div class="footer-content">
    <div class="footer-section">
      <h3>Nexsha Studio</h3>
      <p>Crafting high-end digital experiences and architectural spaces.</p>
    </div>

    <div class="footer-section">
      <h4>Quick Links</h4>
      <ul>
        <li><a routerLink="/">Home</a></li>
        <li><a routerLink="/projects">Portfolio</a></li>
        <li><a routerLink="/about">Studio</a></li>
        <li><a routerLink="/contact">Contact</a></li>
      </ul>
    </div>

    <div class="footer-section">
      <h4>Connect</h4>
      <div class="social-links">
        <a *ngFor="let link of portfolio.socialLinks()" 
           [href]="link.url" 
           target="_blank"
           [title]="link.platform">
          {{ link.platform }}
        </a>
      </div>
    </div>
  </div>

  <div class="footer-bottom">
    <p>&copy; 2026 Nexsha Studio. All rights reserved.</p>
  </div>
</footer>
